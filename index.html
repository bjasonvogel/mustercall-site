<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muster</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0F172A;
      color: #F1F5F9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      user-select: none;
    }

    .icon-wrap svg.megaphone {
      width: 220px;
      height: 220px;
      filter: drop-shadow(0 16px 40px rgba(251, 146, 60, 0.30));
    }

    .wordmark {
      font-size: 2.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #F1F5F9;
    }

    .wordmark span {
      color: #FB923C;
    }

    .tagline {
      font-size: 1rem;
      color: #64748B;
      font-weight: 400;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="icon-wrap">
      <svg class="megaphone" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <rect width="100" height="100" rx="20" fill="#EA580C"/>
        <polygon points="18,41 18,59 63,70 63,30" fill="#ffffff"/>
        <rect x="12" y="41" width="8" height="18" rx="2" fill="#ffffff"/>
        <path d="M 68,43 Q 78,50 68,57" stroke="#ffffff" stroke-width="5" stroke-linecap="round" fill="none"/>
        <path d="M 74,36 Q 88,50 74,64" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
      </svg>
    </div>

    <div class="wordmark">Muster<span>.</span></div>
    <p class="tagline">Safety check-ins for the people you count on.</p>
  </div>

</body>
</html>
